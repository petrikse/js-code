DOCTYPE HTML>
<html>
<head>
<title>Guess the number</title>
</head>

<body>

<p>Guess the number 1-10</p>

<input type="number" id="guess" placeholder="enter number">
<button onclick="guess()">SUBMIT</button>
<button onclick="resetGame()">RESET</button>

<h1 id="result"></h1>
<h2 id="score">Score: 0</h2>

<script>

alert("Cau ty cavo");

let randomNumber = Math.floor(Math.random() * 10) + 1;
let score = 0;

function guess() {

    let userGuess = Number(document.getElementById("guess").value);
    let result = document.getElementById("result");
    let scoreText = document.getElementById("score");

    if (userGuess == randomNumber) {
        result.textContent = "Correct! You guessed it!";
        score = score + 1;
        scoreText.textContent = "Score: " + score;
    } else {
        result.textContent = "Wrong! Try again.";
    }

}

function resetGame() {

    randomNumber = Math.floor(Math.random() * 10) + 1;

    document.getElementById("guess").value = "";
    document.getElementById("result").textContent = "";

    score = 0;
    document.getElementById("score").textContent = "Score: 0";

}

</script>

</body>
</html>
